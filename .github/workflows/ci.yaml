name: CI

# End-to-end self-validation for ubi9-application-template. The contract
# checks run on every push and pull request; the image build proves the
# manifest, Dockerfile, generator, and runtime hardening assertions cohere
# into a working UBI 9 (ubi-micro) OCI image.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@6b51ade7a9e4a75a7ad929842dd298a3804ebe8b # v23.1.0
        with:
          globs: "**/*.md"

  template-verify:
    name: template verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Verify template contract
        run: python tools/verify.py ci
      - name: Check runtime assertion script syntax
        run: bash -n tests/runtime-hardening.sh
      - name: Check build helper script syntax
        run: |
          bash -n tools/build_app.sh
          bash -n tools/build_image.sh

  # The build + SHA-verify + runtime-hardening pipeline lives in the
  # template-specific reusable workflow so downstream image repositories can
  # call the same contract instead of copy-pasting these steps. Here we run it
  # as the template's own self-test against the example manifest.
  image-build:
    name: image build + hardening
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-ubi-image-build.yaml
    with:
      manifest_path: examples/image-manifest.json
      image_tag: ubi9-application-template:ci
      platform: linux/amd64
      run_smoke_test: true
