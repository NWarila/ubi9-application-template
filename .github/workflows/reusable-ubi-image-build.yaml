name: Reusable UBI image build

# Build a UBI 9 (ubi-micro) image from a reviewed manifest, verify the built
# application binaries match the manifest's recorded SHA256, and run the
# runtime hardening assertions (no shell, no package manager, no curl, no
# wget; rpmdb preserved; CA bundle populated) against the resulting image.
#
# Template-specific reusable: consumers that derive from
# ubi9-application-template and preserve its tools/ contract
# (build_app.sh, build_image.sh, verify_app_shas.py, runtime-hardening.sh)
# can call this directly instead of mirroring the build pipeline into their
# own workflow yaml.
#
# This is a local --load build for runtime testing. Persistent SBOM,
# provenance, attestation, and signature evidence belong in a separate
# publish workflow that exports to a registry by digest. See
# docs/how-to/publish-image.md for the publish-side contract.
#
# Caller pattern:
#   uses: NWarila/ubi9-application-template/.github/workflows/reusable-ubi-image-build.yaml@<40-char-sha>
#   with:
#     manifest_path: contracts/image-manifest.json
#     image_tag: my-app:ci
#   permissions:
#     contents: read

on:
  workflow_call:
    inputs:
      manifest_path:
        description: |
          Relative path (from the calling repo's root) to the image
          manifest the build pipeline should consume.
        required: false
        type: string
        default: examples/image-manifest.json
      image_tag:
        description: |
          Tag for the locally-loaded image. Used by build_image.sh,
          runtime-hardening.sh, and the optional smoke-run step.
          Release pipelines push by digest separately; this tag is for
          runtime testing only.
        required: false
        type: string
        default: ubi9-image:ci
      platform:
        description: |
          Target platform (linux/amd64 or linux/arm64). The default --load
          build is single-platform; multi-arch needs QEMU and is left to
          consumers that wire it up explicitly.
        required: false
        type: string
        default: linux/amd64
      go_image:
        description: |
          Pinned Go builder image (tag@sha256:...) consumed by
          tools/build_app.sh via the GO_IMAGE env var. Override only if
          your application source needs a different Go toolchain than the
          template's example.
        required: false
        type: string
        # renovate: datasource=docker depName=golang versioning=docker
        default: "golang:1.23.4-alpine3.21@sha256:c23339199a08b0e12032856908589a6d41a0dab141b8b3b21f156fc571a3f1d3"
      python_version:
        description: Python version for the verify scripts.
        required: false
        type: string
        default: "3.12"
      run_smoke_test:
        description: |
          When true, runs `docker run --rm <image_tag>` after hardening.
          Set to false for applications whose entrypoint does not exit
          cleanly (servers, daemons) or that require runtime arguments.
        required: false
        type: boolean
        default: false
      timeout_minutes:
        description: Job timeout.
        required: false
        type: number
        default: 15

permissions: {}

jobs:
  build:
    name: build + hardening (${{ inputs.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build application binaries
        env:
          GO_IMAGE: ${{ inputs.go_image }}
        run: bash tools/build_app.sh

      - name: Verify built application SHA256 matches manifest
        env:
          MANIFEST_PATH: ${{ inputs.manifest_path }}
        run: python tools/verify_app_shas.py "${MANIFEST_PATH}"

      - name: Build UBI image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          MANIFEST_PATH: ${{ inputs.manifest_path }}
          PLATFORM: ${{ inputs.platform }}
        run: bash tools/build_image.sh "${MANIFEST_PATH}" "${IMAGE_TAG}" "${PLATFORM}"

      - name: Run runtime hardening assertions
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: bash tests/runtime-hardening.sh "${IMAGE_TAG}"

      - name: Smoke run the built image
        if: ${{ inputs.run_smoke_test }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: docker run --rm "${IMAGE_TAG}"
