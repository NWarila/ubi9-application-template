name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions: {}

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: NWarila/.github/.github/workflows/reusable-iac-security.yaml@f662842c3f8add367104315afe8be39f7a2f6953
